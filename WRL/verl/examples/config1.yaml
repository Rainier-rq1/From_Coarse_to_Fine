data:
  train_files: /oss/rqy/qingyu/verl/data/train_all_scaler_processed_2w_dp.parquet
  val_files: /oss/rqy/qingyu/verl/data/test.parquet
  prompt_key: prompt
  max_prompt_length: 8192
  max_response_length: 8192
  rollout_batch_size: 384
  shuffle: true
  seed: 1
  max_pixels: 4194304
  min_pixels: 262144

algorithm:
  adv_estimator: grpo
  kl_coef: 0.0

worker:
  actor:
    global_batch_size: 96
    micro_batch_size_per_device_for_update: 2
    micro_batch_size_per_device_for_experience: 8
    max_grad_norm: 1.0
    use_kl_loss: true
    kl_loss_coef: 1.0e-2
    kl_loss_type: low_var_kl
    padding_free: true
    ulysses_sequence_parallel_size: 1
    model:
      model_path: Qwen/Qwen2.5-7B-Instruct
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: true

  rollout:
    temperature: 1.0
    n: 5
    gpu_memory_utilization: 0.8
    enforce_eager: false
    enable_chunked_prefill: false
    #max_num_batched_tokens : 16000
    max_num_batched_tokens : 30000
    tensor_parallel_size: 2
    limit_images: 0
    val_override_config:
      temperature: 0.5
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_type: function
    compute_score: instruction

trainer:
  total_episodes: 5
  logger: ["swanlab"]
  project_name: 7b_pe_np
  experiment_name: qwen2_5_7b
  n_gpus_per_node: 8
  nnodes: 2
  val_freq: 52
  val_before_train: true
  val_only: false
  val_generations_to_log: 20
  save_freq: 52
  remove_previous_ckpt: false
  remove_ckpt_after_load: false
  save_checkpoint_path: /oss/rqy/checkpoints/7b_pe_np/qwen2_5_7b
  load_checkpoint_path: null

  